imports:
  - system.yaml

pipeline:
  k: 20
  seed: 42
  recent_days: 30

candidates:
  per_generator_k: 250
  generators:
    - name: global_popularity
      params: {}
    - name: recent_popularity
      params:
        decay_days: 12.0
    - name: user_genre
      params:
        genre_smoothing: 1.0
    - name: user_author
      params:
        author_smoothing: 1.0
    - name: user_language_publisher
      params:
        language_weight: 1.0
        publisher_weight: 0.8
        smoothing: 1.0

ranking:
  source_weights:
    global_popularity: 0.7
    recent_popularity: 0.95
    user_genre: 1.15
    user_author: 1.2
    user_language_publisher: 1.0

validation:
  pseudo_incident_days: 14

